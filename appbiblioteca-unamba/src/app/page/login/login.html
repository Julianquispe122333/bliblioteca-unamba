<p-toast />

<div class="min-h-screen flex items-center justify-center p-4 bg-slate-50">
  <div class="w-full max-w-md">
    
    <!-- Professional Light Card -->
    <p-card styleClass="shadow-lg border border-slate-200/80 rounded-2xl bg-white">
      <div class="flex flex-col gap-6">
        
        <!-- Header -->
        <div class="text-center pb-4 border-b border-slate-100">
          <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-50 border border-indigo-100 mb-3 text-indigo-600">
            <i class="pi pi-book text-3xl"></i>
          </div>
          <h1 class="text-2xl font-bold text-slate-800 tracking-tight">BIBLIOTECA UNAMBA</h1>
          <p class="text-slate-400 text-xs mt-1">Universidad Nacional Micaela Bastidas de Apurímac</p>
        </div>

        <!-- Correo Institucional -->
        <div class="flex flex-col gap-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Correo Institucional</label>
          <div class="relative">
            <input 
              pInputText 
              type="email"
              [(ngModel)]="correo"
              placeholder="usuario@unamba.edu.pe"
              class="w-full pl-3 pr-9 py-2.5 bg-white border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-slate-800 outline-none text-sm" />
            <i class="pi pi-envelope absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          </div>
        </div>

        <!-- Código Universitario -->
        <div class="flex flex-col gap-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Código Universitario</label>
          <div class="relative">
            <input 
              pInputText 
              type="text"
              [(ngModel)]="codigo"
              placeholder="Ej: 2021100123"
              class="w-full pl-3 pr-9 py-2.5 bg-white border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-slate-800 outline-none text-sm" />
            <i class="pi pi-id-card absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
          </div>
        </div>

        <!-- Role Select Dropdown -->
        <div class="flex flex-col gap-2">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">Tipo de Usuario</label>
          <p-select 
            [options]="roles" 
            [(ngModel)]="selectedRole" 
            optionLabel="name" 
            optionValue="value" 
            placeholder="Seleccione un rol" 
            styleClass="w-full" />
        </div>

        <!-- Submit Button -->
        <div class="pt-2">
          <p-button 
            label="Ingresar al Sistema" 
            icon="pi pi-sign-in" 
            styleClass="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium border-none rounded-xl transition-all shadow-md" 
            (click)="ingresar()" />
        </div>

      </div>
    </p-card>

    <!-- Footer -->
    <div class="text-center mt-6 text-xs text-slate-400">
      &copy; 2026 UNAMBA &bull; Portal del Estudiante y Administrador
    </div>

  </div>
</div>
